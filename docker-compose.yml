version: '3.8'

services:
  meshtastic-monitor:
    build: .
    container_name: meshtastic-monitor
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      # Монтируем конфиг файлы если нужно
      - ./config:/app/config:ro
      # Логи
      - ./logs:/app/logs
    # Если нужны порты
    # ports:
    #   - "80:81"
    networks:
      - meshtastic-network

  # Watchtower для автоматического обновления образов
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=600  # Проверка каждые 5 минут
      - WATCHTOWER_INCLUDE_STOPPED=true
    command: meshtastic-monitor

networks:
  meshtastic-network:
    driver: bridge
